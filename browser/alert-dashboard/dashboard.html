<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>SOC Homelab — Live Alarmdashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0b0f13;
    --surface: #141a20;
    --surface-2: #1a2128;
    --border: #232b33;
    --text: #e6ebef;
    --muted: #8b97a3;
    --scan: #2b8fd1;
    --exploit: #d13b3b;
    --reverse: #e0316b;
    --ddos: #e0672c;
    --sqli: #8a4fd1;
    --xss: #c99a1f;
    --other: #6b7280;
    --ok: #35a373;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  .mono { font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace; }

  #app { display: flex; flex-direction: column; height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.9rem 1.4rem; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 { font-size: 1.05rem; margin: 0; letter-spacing: 0.01em; }
  header h1 span { color: var(--muted); font-weight: 400; font-size: 0.85rem; margin-left: 0.6rem; }
  .status { display: flex; align-items: center; gap: 1.4rem; font-size: 0.82rem; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 0.4rem; background: var(--muted); }
  .dot.live { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
  .dot.stale { background: var(--exploit); }
  #mute, #settingsBtn { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 0.35rem 0.8rem; cursor: pointer; font-size: 0.8rem; }
  #mute.muted { color: var(--exploit); border-color: var(--exploit); }

  /* MangoHud-style overlay strip -- Joost's own in-game HUD reference,
     2026-07-15: transparent-dark backdrop, bold tabular values, small
     superscript-style units, a colored label per metric (matches
     MangoHud's own palette: CPU yellow, GPU green, RAM purple), thin
     pipe separators, tiny inline sparkline graphs. */
  .health-bar {
    display: flex; align-items: center; gap: 0;
    padding: 0.4rem 1.4rem; background: rgba(0,0,0,0.55); border-bottom: 1px solid var(--border);
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 0.92rem; color: #eef1ee; overflow-x: auto;
  }
  .health-metric { display: flex; align-items: baseline; gap: 0.32rem; white-space: nowrap; padding: 0 0.85rem; }
  .health-metric:not(:last-child) { border-right: 1px solid rgba(255,255,255,0.16); }
  .health-metric .label { font-weight: 700; font-size: 0.82rem; letter-spacing: 0.02em; }
  .health-metric .val { font-variant-numeric: tabular-nums; font-weight: 700; color: #f2f5f2; }
  .health-metric .unit { font-size: 0.68rem; font-weight: 400; color: #b9c2bd; margin-left: 0.05rem; }
  .health-metric .val.na { color: #7c8a80; font-weight: 400; }
  .health-metric .val.warn { color: #e0b34c !important; }
  .health-metric .val.crit { color: #e0574c !important; }
  .health-metric.cpu .label { color: #e8c93f; }
  .health-metric.mem .label { color: #b48af0; }
  .health-metric.disk .label { color: #4fd1e8; }
  .health-metric.net .label { color: #f0954f; }
  .health-metric.gpu .label { color: #4fe881; }
  .health-metric.wan .label { color: #4fa0e8; }
  .health-metric.wan.spike { animation: wanspike 1s ease-in-out infinite; }
  .health-metric.wan.spike .label, .health-metric.wan.spike .val { color: #e0313c !important; }
  @keyframes wanspike { 0%, 100% { background: rgba(224,49,60,0.15); } 50% { background: rgba(224,49,60,0.32); } }
  .health-metric.opnwan .label { color: #c99a1f; }
  .health-metric.opnwan.spike { animation: wanspike 1s ease-in-out infinite; }
  .health-metric.opnwan.spike .label, .health-metric.opnwan.spike .val { color: #e0313c !important; }
  .health-metric.opnwan.offline { animation: opnwanoffline 1.4s ease-in-out infinite; }
  .health-metric.opnwan.offline .label, .health-metric.opnwan.offline .val { color: #8b97a3 !important; }
  @keyframes opnwanoffline { 0%, 100% { background: rgba(139,151,163,0.1); } 50% { background: rgba(139,151,163,0.22); } }
  .health-metric canvas { display: block; height: 14px; width: 42px; margin-left: 0.15rem; }

  /* VM status strip -- one chip per libvirt domain, red/green dot for
     running vs shut off (Joost's request 2026-07-21). Polled separately
     from the health bar since `virsh list` is its own cheap shell-out,
     not part of health.mjs's /proc reads. */
  .vm-bar {
    display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
    padding: 0.45rem 1.4rem; background: rgba(0,0,0,0.35); border-bottom: 1px solid var(--border);
    font-size: 0.82rem;
  }
  .vm-bar .vm-label { color: var(--muted); font-weight: 700; font-size: 0.72rem; letter-spacing: 0.05em; text-transform: uppercase; margin-right: 0.2rem; }
  .vm-chip { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.2rem 0.6rem; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--border); }
  .vm-chip .vm-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .vm-chip.on .vm-dot { background: var(--ok); box-shadow: 0 0 5px var(--ok); }
  .vm-chip.off .vm-dot { background: var(--exploit); }
  .vm-chip .vm-name { color: var(--text); }
  .vm-chip.off .vm-name { color: var(--muted); }

  #settingsPanel {
    position: fixed; top: 5.7rem; right: 1.4rem; z-index: 60;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 1rem 1.2rem; width: 280px; box-shadow: 0 12px 30px rgba(0,0,0,0.5);
    display: none; font-size: 0.85rem;
  }
  #settingsPanel.open { display: block; }
  #settingsPanel h3 { margin: 0 0 0.8rem; font-size: 0.9rem; }
  #settingsPanel label { display: block; margin-top: 0.9rem; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.03em; }
  #settingsPanel select, #settingsPanel input[type="number"] {
    width: 100%; margin-top: 0.3rem; background: var(--surface-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 0.4rem 0.5rem; font-size: 0.85rem;
  }
  #settingsPanel input[type="range"] { width: 100%; margin-top: 0.4rem; }
  #settingsPanel .rangeval { color: var(--muted); font-size: 0.72rem; float: right; }
  #settingsPanel .radiorow { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.4rem; font-size: 0.82rem; text-transform: none; letter-spacing: 0; color: var(--text); }

  .counters {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(84px, 1fr)); gap: 1px;
    background: var(--border); border-bottom: 1px solid var(--border);
  }
  .counter { background: var(--surface); padding: 0.55rem 0.5rem; text-align: center; transition: background 0.3s; }
  .counter .n { font-family: ui-monospace, monospace; font-variant-numeric: tabular-nums; font-size: 1.25rem; font-weight: 700; }
  .counter .l { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.03em; color: var(--muted); margin-top: 0.1rem; line-height: 1.2; }
  .counter.flash { animation: counterflash 1.8s ease-out; }
  @keyframes counterflash { 0%, 40% { background: var(--flash-color, var(--ok)); } 100% { background: var(--surface); } }

  main { flex: 1; display: flex; min-height: 0; }
  .feed-wrap { flex: 1; overflow-y: auto; padding: 1rem 1.4rem 2rem; }
  .feed { display: flex; flex-direction: column; gap: 0.5rem; max-width: 1100px; margin: 0 auto; }

  .conn-panel {
    width: 600px; flex-shrink: 0; border-left: 1px solid var(--border);
    background: var(--surface); display: flex; flex-direction: column; min-height: 0;
  }
  .conn-panel h2 {
    margin: 0; padding: 0.7rem 1rem; font-size: 0.8rem; text-transform: uppercase;
    letter-spacing: 0.04em; color: var(--muted); border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .conn-panel h2 .count { font-family: ui-monospace, monospace; color: var(--text); }
  .conn-search-wrap { padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); }
  .conn-search-wrap input {
    width: 100%; box-sizing: border-box; background: var(--surface-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px; padding: 0.4rem 0.6rem;
    font-size: 0.75rem; font-family: inherit;
  }
  .conn-search-wrap input:focus { outline: 1px solid var(--accent, #2b8fd1); }
  .conn-list { flex: 1; overflow-y: auto; font-family: ui-monospace, monospace; font-size: 0.72rem; }
  .conn-empty { padding: 1rem; color: var(--muted); font-size: 0.72rem; text-align: center; }
  .conn-row {
    display: grid; grid-template-columns: 32px 1fr 14px 1fr 88px 108px; gap: 0.4rem;
    padding: 0.35rem 1rem; border-bottom: 1px solid var(--surface-2); align-items: center;
  }
  .conn-actions { display: flex; gap: 2px; justify-content: flex-end; }
  .conn-actions button {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 4px; width: 20px; height: 20px; padding: 0; cursor: pointer; font-size: 0.7rem;
    line-height: 1; display: flex; align-items: center; justify-content: center;
  }
  .conn-actions button:hover { border-color: var(--scan); }
  .conn-actions button.danger:hover { border-color: var(--exploit); }
  .duration-choice { display: flex; gap: 0.5rem; margin-top: 0.8rem; flex-wrap: wrap; }
  .duration-choice button {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 0.45rem 0.9rem; cursor: pointer; font-size: 0.8rem;
  }
  .duration-choice button:hover { border-color: var(--exploit); }
  .banlist-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.5rem 0; border-bottom: 1px solid var(--surface-2); gap: 0.6rem;
  }
  .banlist-row .bip { font-family: ui-monospace, monospace; }
  .banlist-row .bmeta { color: var(--muted); font-size: 0.72rem; }
  .banlist-row button {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 0.3rem 0.7rem; cursor: pointer; font-size: 0.75rem; flex-shrink: 0;
  }

  .lookup-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; display: none;
  }
  .lookup-backdrop.open { display: block; }
  .lookup-modal {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 91;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    width: 560px; max-width: 90vw; max-height: 70vh; display: flex; flex-direction: column;
    box-shadow: 0 12px 30px rgba(0,0,0,0.5); font-size: 0.85rem;
  }
  .lookup-modal h4 {
    margin: 0; padding: 0.8rem 1rem; border-bottom: 1px solid var(--border);
    font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center;
  }
  .lookup-modal .lclose { background: none; border: none; color: var(--muted); font-size: 1.1rem; cursor: pointer; }
  .lookup-modal .lbody { padding: 1rem; overflow-y: auto; }
  .lookup-modal .lbody pre {
    white-space: pre-wrap; word-break: break-all; font-family: ui-monospace, monospace;
    font-size: 0.72rem; color: var(--text); margin: 0;
  }
  .lookup-modal .lrow { display: flex; gap: 0.5rem; padding: 0.2rem 0; }
  .lookup-modal .lrow .lk { color: var(--muted); width: 90px; flex-shrink: 0; }
  .lookup-modal .lwarn { color: var(--exploit); font-weight: 600; margin-bottom: 0.6rem; }
  .lookup-modal .lmap-link { display: inline-block; margin-top: 0.6rem; color: var(--scan); }
  .lookup-modal .lreturn {
    margin-top: 0.9rem; background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 0.4rem 0.9rem; cursor: pointer; font-size: 0.8rem;
  }
  .conn-row.lab { background: var(--accent-soft, rgba(43,143,209,0.08)); }
  .conn-row.threat-warning { background: rgba(224,140,44,0.18); box-shadow: inset 3px 0 0 #e08c2c; }
  .conn-row.threat-critical { background: rgba(224,49,60,0.2); box-shadow: inset 3px 0 0 #e0313c; animation: threatpulse 1.4s ease-in-out infinite; }
  .conn-row.voip { background: rgba(62,207,110,0.14); box-shadow: inset 3px 0 0 #3ecf6e; }
  .conn-row.synthetic { border-bottom-style: dashed; opacity: 0.92; }
  .conn-row.synthetic .proto { font-style: italic; }
  @keyframes threatpulse { 0%, 100% { background: rgba(224,49,60,0.2); } 50% { background: rgba(224,49,60,0.36); } }
  .conn-row .proto { color: var(--muted); text-transform: uppercase; }
  .conn-row .addr { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conn-row .arrow { color: var(--muted); text-align: center; }
  .conn-row .proc { color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conn-row .pid { color: #7c8a80; }
  .row {
    display: grid; grid-template-columns: 6px 82px 34px 100px 1fr auto auto; gap: 0.9rem;
    align-items: center; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.55rem 0.9rem; font-size: 0.85rem;
    animation: fadein 0.3s ease-out;
  }
  .row .row-actions { display: flex; gap: 0.35rem; }
  .row .block-src, .row .investigate-btn {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 4px; width: 24px; height: 24px; padding: 0; cursor: pointer; font-size: 0.8rem;
    line-height: 1; display: flex; align-items: center; justify-content: center;
  }
  .row .block-src:hover { border-color: var(--exploit); }
  .row .investigate-btn:hover { border-color: #3a7fc1; }
  .row .investigate-btn:disabled { opacity: 0.5; cursor: default; }
  @keyframes fadein { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .row .bar { width: 6px; align-self: stretch; border-radius: 4px; }
  .row .sev {
    width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 0.62rem; font-weight: 800; color: #0b0d0c;
  }
  .row .sev.sev-high { background: #e0313c; color: #fff; }
  .row .sev.sev-medium { background: #e0952c; }
  .row .sev.sev-low { background: #6b93c9; color: #fff; }
  .row .net-host { white-space: nowrap; }
  .row .net-host .arrow { color: var(--muted); }
  .row .net-ip { color: var(--muted); font-size: 0.72rem; margin-top: 0.1rem; white-space: nowrap; }
  .row .time { color: var(--muted); font-size: 0.76rem; }
  .row .bucket { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
  .row .sig { }
  .row .net { color: var(--muted); font-size: 0.76rem; text-align: right; white-space: nowrap; }
  .row.flash { animation: rowflash 1.8s ease-out; }
  @keyframes rowflash { 0%, 40% { box-shadow: 0 0 0 2px var(--flash-color, var(--ok)) inset; } 100% { box-shadow: none; } }
  .empty { color: var(--muted); text-align: center; padding: 3rem 1rem; }

  /* Small popup, top-right -- one per announced category, not one per alert */
  #banner-stack {
    position: fixed; top: 5.7rem; right: 1.4rem;
    z-index: 55; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none;
    width: min(320px, 88vw);
  }
  .banner {
    border-radius: 10px; padding: 0.75rem 1rem; color: #fff;
    box-shadow: 0 10px 30px rgba(0,0,0,0.45);
    display: flex; align-items: flex-start; gap: 0.65rem;
    animation: slidein 0.3s cubic-bezier(.2,.8,.2,1), fadeout 0.4s ease-in forwards 5.2s;
  }
  @keyframes slidein { from { opacity: 0; transform: translateX(16px) scale(0.98); } to { opacity: 1; transform: translateX(0) scale(1); } }
  @keyframes fadeout { to { opacity: 0; transform: translateX(8px); } }
  .banner .icon { font-size: 1.3rem; line-height: 1.1; }
  .banner .body { flex: 1; min-width: 0; }
  .banner .btitle { font-weight: 700; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.03em; }
  .banner .bsig { font-size: 0.76rem; opacity: 0.95; margin-top: 0.1rem; }

  @media (prefers-reduced-motion: reduce) {
    .row, .banner, .counter, .conn-row.threat-critical { animation: none !important; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>SOC Homelab — Live Alarmdashboard <span>Bazzite-host</span></h1>
    <div class="status">
      <span><span id="statusDot" class="dot"></span><span id="statusText">verbinden...</span></span>
      <span id="totalCount" class="mono">0 alerts</span>
      <button id="mute">🔊 Geluid aan</button>
      <button id="clearBtn">🗑️ Wis meldingen</button>
      <button id="banListBtn">🚫 Banlijst</button>
      <button id="networkFallbackBtn" title="Forceer internet direct via de KPN-router (enp6s0), los van OPNsense">🆘 KPN-terugval</button>
      <button id="settingsBtn">⚙️ Instellingen</button>
    </div>
  </header>

  <div class="health-bar" id="healthBar">
    <span class="health-metric cpu">
      <span class="label">CPU</span> <span class="val na" id="hCpu">–</span><span class="unit">%</span>
      <canvas id="gCpu" width="42" height="14"></canvas>
      <span class="val na" id="hCpuTemp">–</span><span class="unit">°C</span>
      <span class="val na" id="hCpuGHz">–</span><span class="unit">GHz</span>
    </span>
    <span class="health-metric mem">
      <span class="label">RAM</span> <span class="val na" id="hMem">–</span><span class="unit">%</span>
    </span>
    <span class="health-metric disk">
      <span class="label">DISK</span> <span class="val na" id="hDisk">–</span><span class="unit">%</span>
    </span>
    <span class="health-metric net">
      <span class="label">NET</span> <span class="val na" id="hNet">–</span>
    </span>
    <span class="health-metric gpu">
      <span class="label">GPU</span> <span class="val na" id="hGpu">–</span>
      <canvas id="gGpu" width="42" height="14"></canvas>
      <span class="val na" id="hGpuVram">–</span><span class="unit">% VRAM</span>
    </span>
    <span class="health-metric wan" id="hWanMetric" title="Inkomend verkeer op je KPN-verbinding (enp6s0), met piekdetectie">
      <span class="label">WAN</span> <span class="val na" id="hWan">–</span><span class="unit">Mbps</span>
      <canvas id="gWan" width="42" height="14"></canvas>
    </span>
    <span class="health-metric opnwan" id="hOpnWanMetric" title="OPNsense's eigen WAN (het lab, sinds Fase 2 van de migratie) -- inbrand-monitoring: piekdetectie + is de interface nog in leven">
      <span class="label">OPN-WAN</span> <span class="val na" id="hOpnWan">–</span><span class="unit">Mbps</span>
      <canvas id="gOpnWan" width="42" height="14"></canvas>
    </span>
  </div>

  <div class="vm-bar" id="vmBar">
    <span class="vm-label">VM's</span>
  </div>

  <div id="settingsPanel">
    <h3>🎙️ Voice-instellingen</h3>

    <label>🎤 Stem</label>
    <select id="setVoice">
      <optgroup label="Vrouw (US)">
        <option value="en_US-hfc_female-medium">HFC Female (US)</option>
        <option value="en_US-amy-medium">Amy (US)</option>
        <option value="en_US-kristin-medium">Kristin (US)</option>
        <option value="en_US-ljspeech-medium">LJSpeech (US)</option>
        <option value="en_US-ljspeech-high">LJSpeech HQ (US)</option>
      </optgroup>
      <optgroup label="Vrouw (GB)">
        <option value="en_GB-jenny_dioco-medium">Jenny (GB)</option>
        <option value="en_GB-alba-medium">Alba (GB)</option>
        <option value="en_GB-cori-medium">Cori (GB)</option>
        <option value="en_GB-semaine-medium">Semaine (GB)</option>
        <option value="en_GB-aru-medium">Aru (GB)</option>
      </optgroup>
      <optgroup label="Man">
        <option value="en_US-hfc_male-medium">HFC Male (US)</option>
        <option value="en_US-norman-medium">Norman (US)</option>
        <option value="en_US-bryce-medium">Bryce (US)</option>
        <option value="en_GB-alan-medium">Alan (GB)</option>
      </optgroup>
    </select>

    <label>🗣 Spreeksnelheid <span class="rangeval" id="rateVal">1.0x</span></label>
    <input type="range" id="setRate" min="0.75" max="1.5" step="0.05" value="1.0">

    <label>⏱ Cooldown per categorie <span class="rangeval" id="cooldownVal">30s</span></label>
    <input type="range" id="setCooldown" min="1" max="120" step="1" value="30">

    <label>🚨 Uitspreken bij</label>
    <div class="radiorow"><input type="radio" name="filterLevel" id="filterCritical" value="critical"><label for="filterCritical" style="display:inline;text-transform:none;color:inherit">Alleen Critical</label></div>
    <div class="radiorow"><input type="radio" name="filterLevel" id="filterHigh" value="high"><label for="filterHigh" style="display:inline;text-transform:none;color:inherit">Critical + High</label></div>
    <div class="radiorow"><input type="radio" name="filterLevel" id="filterAll" value="all"><label for="filterAll" style="display:inline;text-transform:none;color:inherit">Alles uitspreken</label></div>
  </div>

  <div class="lookup-backdrop" id="lookupBackdrop"></div>
  <div class="lookup-modal" id="lookupModal" style="display:none">
    <h4><span id="lookupTitle">Lookup</span><button class="lclose" id="lookupClose">✕</button></h4>
    <div class="lbody" id="lookupBody"></div>
  </div>

  <div class="counters" id="counters"></div>

  <main>
    <div class="feed-wrap"><div class="feed" id="feed"><div class="empty">Wachten op de eerste poll...</div></div></div>
    <div class="conn-panel">
      <h2>Actieve verbindingen <span class="count" id="connCount">–</span></h2>
      <div class="conn-search-wrap">
        <input type="text" id="connSearch" placeholder="Zoek: discord, qbittorrent, youtube, tcp, ssh/auth, voip, IP, poort...">
      </div>
      <div class="conn-list" id="connList"></div>
    </div>
  </main>
</div>
<div id="banner-stack"></div>

<script>
// Mirrors browser/alert-dashboard/categorize.mjs -- keep these two in
// sync by hand (categorize.mjs is the source of truth server-side; this
// copy exists only because dashboard.html has no module loader). PRIORITY
// order (highest first) matches Joost's explicit voice-announcement
// priority and is reused here for the counters strip too.
const CATEGORIES = {
  REVERSE_SHELL:   { label: 'Reverse Shell',         color: '#e0316b', icon: '💀', freq: 196 },
  PRIV_ESC:        { label: 'Privilege Escalation',  color: '#c2185b', icon: '👑', freq: 208 },
  EXPLOIT:         { label: 'Exploit',               color: '#d13b3b', icon: '💥', freq: 220 },
  CRED_ACCESS:     { label: 'Credential Access',     color: '#b5384a', icon: '🔑', freq: 233 },
  LATERAL_MOVEMENT:{ label: 'Lateral Movement',      color: '#a8492f', icon: '➡️', freq: 247 },
  PERSISTENCE:     { label: 'Persistence',           color: '#9c5a26', icon: '📌', freq: 262 },
  MITM:            { label: 'MITM',                  color: '#8a6d1f', icon: '🕵️', freq: 277 },
  WIRELESS:        { label: 'Wireless',              color: '#7a7a1f', icon: '📶', freq: 294 },
  SQLI:            { label: 'SQL Injection',         color: '#8a4fd1', icon: '🗄️', freq: 330 },
  XSS:             { label: 'Cross-Site Scripting',  color: '#c99a1f', icon: '📜', freq: 349 },
  ENUMERATION:     { label: 'Enumeration',           color: '#3a7fc1', icon: '📋', freq: 415 },
  OS_FINGERPRINT:  { label: 'OS Fingerprinting',     color: '#2f8fb0', icon: '🧬', freq: 440 },
  RECON:           { label: 'Recon',                 color: '#2b8fd1', icon: '🔍', freq: 494 },
  DOS:             { label: 'DoS',                   color: '#e0672c', icon: '🌊', freq: 262 },
  P2P:             { label: 'P2P/Torrent',           color: '#4a7a4a', icon: '🧲', freq: 196 },
  OTHER:           { label: 'Overig',                color: '#6b7280', icon: 'ℹ️', freq: 523 },
};
const ORDER = [
  'REVERSE_SHELL', 'PRIV_ESC', 'EXPLOIT', 'CRED_ACCESS', 'LATERAL_MOVEMENT',
  'PERSISTENCE', 'MITM', 'WIRELESS', 'SQLI', 'XSS', 'ENUMERATION',
  'OS_FINGERPRINT', 'RECON', 'DOS', 'P2P', 'OTHER',
];

function priorityRank(bucket) {
  const i = ORDER.indexOf(bucket);
  return i === -1 ? ORDER.length : i;
}

// --- Threat correlation for the connections panel: when an alert fires,
// glow that IP's row(s) red (REVERSE_SHELL..MITM, rank 0-6) or orange
// (everything else) for a while, so a scan/exploit against the host is
// visible right where its connection actually shows up, not just in the
// feed. Also flag known VoIP/game processes green so lab traffic can be
// told apart from Joost's own Discord/TeamSpeak/gaming traffic at a glance.
const threatIps = new Map(); // ip -> { level: 'critical'|'warning', until: epoch ms }
const THREAT_GLOW_MS = 60_000;
const THREAT_RANK = { critical: 0, warning: 1 };
function markThreatIp(ip, level) {
  if (!ip) return;
  const existing = threatIps.get(ip);
  if (existing && existing.until > Date.now() && THREAT_RANK[existing.level] <= THREAT_RANK[level]) {
    existing.until = Date.now() + THREAT_GLOW_MS; // keep the worse level, just refresh the timer
    return;
  }
  threatIps.set(ip, { level, until: Date.now() + THREAT_GLOW_MS });
}
function threatLevelFor(ip) {
  const t = threatIps.get(ip);
  if (!t) return null;
  if (t.until < Date.now()) { threatIps.delete(ip); return null; }
  return t.level;
}

// The connections panel only ever sees the Bazzite HOST's own sockets
// (`ss`) -- an alert between two other lab machines (e.g. Kali scanning
// Metasploitable2) never touches the host's network stack, so it can
// never appear there as a real row. To still make that traffic visible,
// keep the actual src->dst pair from each alert and render it as a
// separate "network-only" row (no PID, clearly not a host process) in
// pollConnections() whenever no real host connection already covers it.
const recentAlertLinks = new Map(); // "src|dst" -> { srcIp, dstIp, bucket, level, until }
function markAlertLink(a, level) {
  recentAlertLinks.set(a.srcIp + '|' + a.dstIp, {
    srcIp: a.srcIp, dstIp: a.dstIp, bucket: a.bucket, level, until: Date.now() + THREAT_GLOW_MS,
  });
}

// Heuristic: matched against the process name `ss` reports. Not exhaustive
// (there's no generic way to know every game binary) -- extend this list
// as new voice/game apps come up.
const VOIP_GAME_KEYWORDS = ['discord', 'teamspeak', 'ts3client', 'mumble', 'ventrilo', 'steam', 'arma', 'reforger', 'csgo', 'cs2', 'dota2'];
function isVoipOrGame(process) {
  const p = (process || '').toLowerCase();
  return VOIP_GAME_KEYWORDS.some((k) => p.includes(k));
}

// Well-known authentication/login ports -- lets the connections search box
// match "auth"/"ssh"/"rdp"/etc. against the *port*, not just the process
// name (a remote SSH/RDP/LDAP session rarely has a recognizable local
// process name on the peer side).
const AUTH_PORTS = {
  22: 'ssh auth', 3389: 'rdp auth', 389: 'ldap auth', 636: 'ldaps auth',
  88: 'kerberos auth', 464: 'kpasswd auth', 5985: 'winrm auth', 5986: 'winrm auth',
};
function authTagFor(localPort, peerPort) {
  return AUTH_PORTS[Number(localPort)] || AUTH_PORTS[Number(peerPort)] || '';
}

// YouTube/Google traffic -- Joost's explicit request, 2026-07-20 (wanted to
// spot an idle YouTube tab explaining WAN traffic during a spike test).
// Unlike Discord/Steam this never shows a distinct process name (it's just
// "chrome" making an HTTPS connection), so there's nothing to match on
// except the peer IP falling in one of Google's known ranges. Not
// exhaustive -- covers the common googlevideo.com/Google Front End ranges
// actually seen in this host's own traffic (IPv4 + the IPv6 range from the
// 2a00:1450:... rows already visible in the connections panel).
const GOOGLE_IP_PREFIXES = [
  '172.217.', '142.250.', '216.58.', '74.125.', '173.194.', '108.177.',
  '2a00:1450', '2607:f8b0',
];
function isGoogleIp(ip) {
  const lower = (ip || '').toLowerCase();
  return GOOGLE_IP_PREFIXES.some((p) => lower.startsWith(p));
}

// Free-text filter for the connections panel (proces, protocol, ip, poort,
// voip, auth) -- Joost's explicit request, 2026-07-20. Pure substring
// match against a per-row search blob, case-insensitive.
let connSearchTerm = '';
document.getElementById('connSearch').addEventListener('input', (e) => {
  connSearchTerm = e.target.value.trim().toLowerCase();
  pollConnections();
});

// --- Settings: voice on/off, voice, rate, cooldown, severity filter.
// Persisted to localStorage so they survive a page refresh (Joost's
// explicit requirement, SOC Dashboard v2 roadmap, 2026-07-15).
const SETTINGS_KEY = 'soc-dashboard-voice-settings-v1';
const DEFAULT_SETTINGS = { voiceEnabled: true, voice: 'en_US-amy-medium', rate: 1.0, cooldownSec: 30, filterLevel: 'all' };
function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    return raw ? { ...DEFAULT_SETTINGS, ...JSON.parse(raw) } : { ...DEFAULT_SETTINGS };
  } catch (e) { return { ...DEFAULT_SETTINGS }; }
}
function saveSettings() { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }
let settings = loadSettings();

function applySettingsToUI() {
  document.getElementById('setVoice').value = settings.voice;
  document.getElementById('setRate').value = settings.rate;
  document.getElementById('rateVal').textContent = settings.rate.toFixed(2) + 'x';
  document.getElementById('setCooldown').value = settings.cooldownSec;
  document.getElementById('cooldownVal').textContent = settings.cooldownSec + 's';
  document.getElementById('filter' + settings.filterLevel[0].toUpperCase() + settings.filterLevel.slice(1)).checked = true;
}

let muted = false; // manual quick-toggle (mute button), separate from settings.voiceEnabled
let lastSince = 0;
let lastDismissedSince = 0;

// False-positive dismissals (2026-07-21): a periodic Claude Code triage
// check calls /api/alerts/dismiss server-side; this removes rows that were
// already rendered here before that ran. Polled independently and less
// often than the main alert feed -- dismissals aren't time-critical.
async function pollDismissed() {
  try {
    const res = await fetch('/api/alerts/dismissed?since=' + lastDismissedSince);
    const data = await res.json();
    for (const d of data.dismissed) {
      const row = document.querySelector('.row[data-id="' + CSS.escape(d.id) + '"]');
      if (row) row.remove();
      if (counts[d.bucket] > 0) counts[d.bucket]--;
      lastDismissedSince = Math.max(lastDismissedSince, d.dismissedAt);
    }
    if (data.dismissed.length) renderCounters();
  } catch (e) { /* non-critical, next interval will retry */ }
}
setInterval(pollDismissed, 15000);
let counts = Object.fromEntries(ORDER.map(k => [k, 0]));
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// Fallback synthetic beep -- used only if a spoken-alert audio clip isn't
// available (e.g. Piper/TTS failed server-side for this alert).
function playBeepFallback(bucket) {
  if (muted || !settings.voiceEnabled) return;
  try {
    const ctx = ensureAudio();
    const meta = CATEGORIES[bucket] || CATEGORIES.OTHER;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.value = meta.freq;
    gain.gain.value = 0.08;
    osc.connect(gain).connect(ctx.destination);
    const start = ctx.currentTime;
    gain.gain.setValueAtTime(0.08, start);
    gain.gain.exponentialRampToValueAtTime(0.001, start + 0.16);
    osc.start(start);
    osc.stop(start + 0.18);
  } catch (e) { /* audio not available yet (needs a user gesture first in some browsers) */ }
}

// Spoken announcement queue -- siren + female voice (Piper, offline
// neural TTS), one clip per announced category (not per alert). Queued
// with a 2s gap between clips (Joost's request 2026-07-15) so two
// announcements decided close together never talk over each other.
const VOICE_GAP_MS = 5000;
// Hard cap on how long one clip is allowed to hold the queue -- if
// onended/onerror never fire (seen 2026-07-21: bursts of alerts during
// scan testing produced overlapping/garbled audio, most likely a stalled
// clip never resolving while newer ones kept queuing behind it), this
// forces the queue to advance instead of piling up silently.
const VOICE_MAX_MS = 12000;
let voiceQueue = Promise.resolve();
let currentAudio = null; // guards against two clips ever sounding at once
function playClip(audioUrl, bucket) {
  voiceQueue = voiceQueue.then(() => new Promise((resolve) => {
    // Always stop whatever's still playing before starting the next one,
    // regardless of how it got left running.
    if (currentAudio) { try { currentAudio.pause(); } catch (e) {} currentAudio = null; }
    if (muted || !settings.voiceEnabled) { resolve(); return; }
    if (!audioUrl) { playBeepFallback(bucket); setTimeout(resolve, VOICE_GAP_MS); return; }
    const audio = new Audio(audioUrl);
    currentAudio = audio;
    let done = false;
    const finish = () => {
      if (done) return;
      done = true;
      if (currentAudio === audio) currentAudio = null;
      setTimeout(resolve, VOICE_GAP_MS);
    };
    const watchdog = setTimeout(finish, VOICE_MAX_MS);
    audio.onended = () => { clearTimeout(watchdog); finish(); };
    audio.onerror = () => { clearTimeout(watchdog); playBeepFallback(bucket); finish(); };
    audio.play().catch(() => { clearTimeout(watchdog); playBeepFallback(bucket); finish(); });
  }));
}

// --- Announcement decision: which category (if any) gets spoken for a
// batch of newly-arrived alerts. Rules (Joost's explicit spec,
// 2026-07-15): don't speak every alert, group identical ones, speak only
// a genuinely new category or an escalation (higher priority than the
// last-announced one), respect a per-category cooldown, and when several
// categories fire in the same batch, speak only the highest-priority one.
const everAnnounced = new Set();
const lastAnnouncedAt = new Map(); // bucket -> ms epoch
let lastAnnouncedBucket = null;

function passesFilter(alert) {
  // P2P/Torrent (Joost's own qBittorrent use, 2026-07-21): expected
  // traffic, not a threat -- never spoken, regardless of the severity
  // filter setting. Still fully visible in the alert feed/counters, only
  // the sound/voice is suppressed. See categorize.mjs for the matching.
  if (alert.bucket === 'P2P') return false;
  if (settings.filterLevel === 'critical') return alert.filterLevel === 'critical';
  if (settings.filterLevel === 'high') return alert.filterLevel === 'critical' || alert.filterLevel === 'high';
  return true; // 'all'
}

// Voice preview -- plays immediately when a new voice is picked in
// Settings, so Joost can hear it before it's used on a real alert. Goes
// through the same queue as real announcements so it never overlaps one.
async function previewVoice() {
  if (muted) return;
  const label = document.querySelector('#setVoice option:checked').textContent;
  let audioUrl = null;
  try {
    const res = await fetch('/api/tts/generate', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: `This is the ${label} voice.`, voice: settings.voice, rate: settings.rate }),
    });
    ({ audioUrl } = await res.json());
  } catch (e) { /* no fallback beep for a preview -- silently skip if TTS failed */ }
  if (audioUrl) playClip(audioUrl, null);
}

async function decideAndAnnounce(batch) {
  if (!settings.voiceEnabled || muted) return;
  const eligible = batch.filter(passesFilter);
  if (!eligible.length) return;

  // Every distinct category present in this batch gets announced, most
  // severe first (Joost's request 2026-07-21: he was missing categories
  // when only the single highest-priority one spoke per batch). playClip's
  // queue (with its 5s gap) keeps these from ever overlapping each other.
  const bucketsPresent = [...new Set(eligible.map((a) => a.bucket))]
    .sort((a, b) => priorityRank(a) - priorityRank(b));

  const now = Date.now();
  const cooldownMs = settings.cooldownSec * 1000;

  for (const bucket of bucketsPresent) {
    const isNew = !everAnnounced.has(bucket);
    const isEscalation = lastAnnouncedBucket && priorityRank(bucket) < priorityRank(lastAnnouncedBucket);
    const cooldownExpired = now - (lastAnnouncedAt.get(bucket) || 0) >= cooldownMs;
    if (!(isNew || isEscalation || cooldownExpired)) continue;

    everAnnounced.add(bucket);
    lastAnnouncedAt.set(bucket, now);
    lastAnnouncedBucket = bucket;

    const bucketAlerts = eligible.filter((a) => a.bucket === bucket);
    const best = bucketAlerts[0];
    // Voice 2.0 (2026-07-15): several alerts of the same category landing
    // in one batch get the calmer grouped phrasing ("Multiple recon events
    // detected.") instead of repeating a full from/against sentence for
    // just one of them -- less noisy during a burst (e.g. a port scan).
    const multiple = bucketAlerts.length > 1;
    const verbose = !multiple && best.filterLevel === 'critical';
    let audioUrl = null;
    try {
      const res = await fetch('/api/tts/generate', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bucket, srcIp: best.srcIp, dstIp: best.dstIp, verbose, multiple, voice: settings.voice, rate: settings.rate, signature: best.signature }),
      });
      ({ audioUrl } = await res.json());
    } catch (e) { /* falls back to beep in playClip */ }

    playClip(audioUrl, bucket);
    showBanner(best);
    flashCounter(bucket);
    flashRows(bucket);
  }
}

function renderCounters() {
  const el = document.getElementById('counters');
  el.innerHTML = ORDER.map(k => {
    const m = CATEGORIES[k];
    return `<div class="counter" id="counter-${k}" style="border-bottom:3px solid ${m.color}">
      <div class="n" style="color:${m.color}">${counts[k]}</div>
      <div class="l">${m.icon} ${m.label}</div>
    </div>`;
  }).join('');
}

function flashCounter(bucket) {
  const el = document.getElementById('counter-' + bucket);
  if (!el) return;
  const meta = CATEGORIES[bucket] || CATEGORIES.OTHER;
  el.style.setProperty('--flash-color', meta.color);
  el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
}

function flashRows(bucket) {
  const meta = CATEGORIES[bucket] || CATEGORIES.OTHER;
  document.querySelectorAll('.row[data-bucket="' + bucket + '"]').forEach((row, i) => {
    if (i >= 5) return; // only the most recent handful, avoid flashing hundreds
    row.style.setProperty('--flash-color', meta.color);
    row.classList.remove('flash'); void row.offsetWidth; row.classList.add('flash');
  });
}

// Display-friendly asset names (docs/SOC_HOMELAB_MASTER_DOCUMENTATION.md
// §9) -- separate from server.mjs's HOST_NAMES, which spells names
// phonetically for Piper ("D C 0 1"). This one is for the visible table.
const HOST_NAMES = {
  '192.168.50.1': 'OPNsense',
  '192.168.50.10': 'DC01',
  '192.168.50.20': 'WIN11-01',
  '192.168.50.30': 'Security Onion',
  '192.168.50.50': 'Kali',
  '192.168.50.70': 'Metasploitable2',
  // Real IP is .100, not .40 -- corrected 2026-07-21 (see NETWORK.md).
  '192.168.50.100': 'ubuntu-server-01',
  '192.168.50.254': 'Bazzite-host',
};
function hostLabel(ip) { return HOST_NAMES[ip] || ip; }

function addRow(a) {
  const feed = document.getElementById('feed');
  if (feed.querySelector('.empty')) feed.innerHTML = '';
  const meta = CATEGORIES[a.bucket] || CATEGORIES.OTHER;
  const sev = (a.severity || 'low').toLowerCase();
  const sevLabel = { high: 'H', medium: 'M', low: 'L' }[sev] || '?';
  const sevTitle = { high: 'High severity', medium: 'Medium severity', low: 'Low severity' }[sev] || 'Onbekende severity';
  const row = document.createElement('div');
  row.className = 'row';
  row.dataset.bucket = a.bucket;
  row.dataset.id = a.id;
  row.innerHTML = `
    <div class="bar" style="background:${meta.color}"></div>
    <div class="time mono">${a.timestamp.slice(11,19)}</div>
    <div class="sev sev-${sev}" title="${sevTitle}">${sevLabel}</div>
    <div class="bucket" style="color:${meta.color}">${meta.icon} ${meta.label}</div>
    <div class="sig">${escapeHtml(a.signature)}</div>
    <div class="net">
      <div class="net-host">${escapeHtml(hostLabel(a.srcIp))} <span class="arrow">→</span> ${escapeHtml(hostLabel(a.dstIp))}</div>
      <div class="net-ip mono">${a.srcIp}:${a.srcPort} → ${a.dstIp}:${a.dstPort}</div>
    </div>
    <div class="row-actions">
      <button class="investigate-btn" data-action="investigate-local" data-id="${escapeHtml(a.id)}" title="Lokaal onderzoeken (regelgebaseerd, direct antwoord)">🔍</button>
      <button class="investigate-btn" data-action="investigate-ai" data-id="${escapeHtml(a.id)}" title="AI onderzoeken (Claude Code, via de periodieke check)">🤖</button>
      <button class="block-src" data-action="block" data-ip="${escapeHtml(a.srcIp)}" title="Bron-IP blokkeren via OPNsense (${escapeHtml(a.srcIp)})">🛑</button>
    </div>
  `;
  feed.prepend(row);
  while (feed.children.length > 300) feed.removeChild(feed.lastChild);
}

function showBanner(a) {
  const meta = CATEGORIES[a.bucket] || CATEGORIES.OTHER;
  const stack = document.getElementById('banner-stack');
  const b = document.createElement('div');
  b.className = 'banner';
  b.style.background = meta.color;
  b.innerHTML = `
    <div class="icon">${meta.icon}</div>
    <div class="body">
      <div class="btitle">${meta.label} gedetecteerd</div>
      <div class="bsig">${escapeHtml(a.signature)}</div>
    </div>
  `;
  stack.appendChild(b);
  setTimeout(() => b.remove(), 5700);
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function poll() {
  try {
    const res = await fetch('/api/alerts?since=' + lastSince);
    const data = await res.json();
    document.getElementById('statusDot').className = 'dot live';
    document.getElementById('statusText').textContent = data.lastPollOk ? ('live · laatste poll ' + data.lastPollOk.slice(11,19) + ' UTC') : 'verbonden';
    document.getElementById('totalCount').textContent = data.total + ' alerts (deze sessie)';

    const newOnes = data.alerts.slice().reverse(); // oldest of the new batch first
    for (const a of newOnes) {
      counts[a.bucket] = (counts[a.bucket] || 0) + 1;
      // P2P/Torrent (Joost's explicit instruction, 2026-07-21): expected
      // traffic, keep it out of the scrolling melding-lijst entirely, not
      // just silent -- the counter tile above still tracks the total so
      // it stays auditable without cluttering the feed.
      if (a.bucket !== 'P2P') addRow(a);
      lastSince = Math.max(lastSince, a.receivedAt);
      const level = priorityRank(a.bucket) <= 6 ? 'critical' : 'warning';
      markThreatIp(a.srcIp, level);
      markThreatIp(a.dstIp, level);
      markAlertLink(a, level);
    }
    if (newOnes.length) {
      renderCounters();
      decideAndAnnounce(newOnes);
    }
  } catch (e) {
    document.getElementById('statusDot').className = 'dot stale';
    document.getElementById('statusText').textContent = 'verbinding verbroken, opnieuw proberen...';
  }
}

document.getElementById('mute').addEventListener('click', () => {
  muted = !muted;
  const btn = document.getElementById('mute');
  btn.textContent = muted ? '🔇 Geluid uit' : '🔊 Geluid aan';
  btn.classList.toggle('muted', muted);
  if (!muted) ensureAudio();
});

document.getElementById('clearBtn').addEventListener('click', async () => {
  if (!confirm('Alle meldingen in het dashboard wissen? Dit wist niets in Security Onion zelf, alleen deze weergave.')) return;
  try {
    await fetch('/api/alerts/clear', { method: 'POST' });
  } catch (e) {
    console.error('[clear] mislukt', e);
    return;
  }
  document.getElementById('feed').innerHTML = '<div class="empty">Wachten op de eerste poll...</div>';
  counts = Object.fromEntries(ORDER.map(k => [k, 0]));
  renderCounters();
  threatIps.clear();
  recentAlertLinks.clear();
  document.getElementById('totalCount').textContent = '0 alerts (deze sessie)';
});

document.getElementById('settingsBtn').addEventListener('click', () => {
  document.getElementById('settingsPanel').classList.toggle('open');
});
document.getElementById('setVoice').addEventListener('change', (e) => {
  settings.voice = e.target.value;
  saveSettings();
  previewVoice();
});
document.getElementById('setRate').addEventListener('input', (e) => {
  settings.rate = Number(e.target.value);
  document.getElementById('rateVal').textContent = settings.rate.toFixed(2) + 'x';
  saveSettings();
});
document.getElementById('setCooldown').addEventListener('input', (e) => {
  settings.cooldownSec = Number(e.target.value);
  document.getElementById('cooldownVal').textContent = settings.cooldownSec + 's';
  saveSettings();
});
document.querySelectorAll('input[name="filterLevel"]').forEach((el) => {
  el.addEventListener('change', (e) => { settings.filterLevel = e.target.value; saveSettings(); });
});

// System health bar (CPU/RAM/Disk/Net/GPU of the Bazzite host itself).
// Each check takes ~150-350ms server-side (samples /proc twice to
// compute a rate) -- polled less often than alerts (10s, not 3s).
function healthClass(pct, warnAt, critAt) {
  if (pct == null) return 'na';
  if (pct >= critAt) return 'crit';
  if (pct >= warnAt) return 'warn';
  return 'ok';
}
// Tiny inline sparklines (MangoHud has these next to CPU/GPU) -- a
// rolling history drawn on a small <canvas>, redrawn each health poll.
const HIST_LEN = 20; // 20 samples * 10s poll = last ~200s
const cpuHistory = [];
const gpuHistory = [];
const wanHistory = [];
let wanWasSpiking = false; // edge-detect: only alert on the false->true transition
function drawSparkline(canvasId, history, color) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  if (history.length < 2) return;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  history.forEach((v, i) => {
    const x = (i / (HIST_LEN - 1)) * w;
    const y = h - (Math.min(v, 100) / 100) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
}
function pushHistory(arr, val) {
  arr.push(val == null ? 0 : val);
  while (arr.length > HIST_LEN) arr.shift();
}

async function pollHealth() {
  try {
    const h = await (await fetch('/api/health')).json();
    const setMetric = (id, val) => {
      const el = document.getElementById(id);
      el.textContent = val != null ? val : 'n/a';
      el.className = 'val ' + (val == null ? 'na' : healthClass(val, 70, 90));
    };
    setMetric('hCpu', h.cpu);
    setMetric('hCpuTemp', h.cpuTempC);
    document.getElementById('hCpuGHz').textContent = h.cpuGHz != null ? h.cpuGHz.toFixed(2) : 'n/a';
    document.getElementById('hCpuGHz').className = 'val ' + (h.cpuGHz != null ? '' : 'na');
    setMetric('hMem', h.mem);
    setMetric('hDisk', h.disk);
    pushHistory(cpuHistory, h.cpu);
    drawSparkline('gCpu', cpuHistory, '#e8c93f');

    const netEl = document.getElementById('hNet');
    if (h.net) {
      netEl.textContent = `↓${(h.net.rxKbps/1000).toFixed(1)} ↑${(h.net.txKbps/1000).toFixed(1)} Mbps`;
      netEl.className = 'val';
    } else {
      netEl.textContent = 'n/a'; netEl.className = 'val na';
    }

    const gpuEl = document.getElementById('hGpu');
    const vramEl = document.getElementById('hGpuVram');
    if (h.gpu) {
      gpuEl.textContent = `${h.gpu.utilPercent}% ${h.gpu.tempC}°C`;
      gpuEl.className = 'val ' + healthClass(h.gpu.tempC, 75, 85);
      vramEl.textContent = h.gpu.vramPercent != null ? h.gpu.vramPercent : 'n/a';
      vramEl.className = 'val ' + (h.gpu.vramPercent != null ? healthClass(h.gpu.vramPercent, 70, 90) : 'na');
      pushHistory(gpuHistory, h.gpu.utilPercent);
    } else {
      gpuEl.textContent = 'n/a'; gpuEl.className = 'val na';
      vramEl.textContent = 'n/a'; vramEl.className = 'val na';
      pushHistory(gpuHistory, null);
    }
    drawSparkline('gGpu', gpuHistory, '#4fe881');

    const wanEl = document.getElementById('hWan');
    const wanMetricEl = document.getElementById('hWanMetric');
    if (h.wan) {
      wanEl.textContent = h.wan.inMbps.toFixed(1);
      wanEl.className = 'val ' + (h.wan.spike ? '' : healthClass(h.wan.inMbps, 50, 150));
      wanMetricEl.classList.toggle('spike', h.wan.spike);
      pushHistory(wanHistory, Math.min(h.wan.inMbps, 100));
      if (h.wan.spike && !wanWasSpiking) announceWanSpike(h.wan);
      wanWasSpiking = h.wan.spike;
    } else {
      wanEl.textContent = 'n/a'; wanEl.className = 'val na';
      wanMetricEl.classList.remove('spike');
      pushHistory(wanHistory, null);
    }
    drawSparkline('gWan', wanHistory, '#4fa0e8');
  } catch (e) { /* leave last-known values on a transient fetch failure */ }
}

// Active connections (Bazzite host itself, ss -tnp/-unp) -- PID + source
// IP, live, 1s refresh matching the health bar's cadence.
function escapeHtml2(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Per-row lookup buttons (WHOIS, GeoIP, SYN-scan) -- Joost's explicit
// request, 2026-07-20. The scan button is rendered on EVERY row (including
// Joost's own general internet traffic -- Discord, Steam, torrent peers),
// but only ever actually fires against an authorized scan-scope (see
// scan-scopes.mjs); anything else gets a blocking warning instead (see
// runLookup('scan', ...)). The real gate is server-side (isAuthorizedScanTarget()
// in server.mjs) -- this client-side copy is just so the warning shows
// instantly without a round-trip. Scopes are fetched once at load, not
// hardcoded here, so adding a future client engagement in scan-scopes.mjs
// is the only place that ever needs to change.
let authorizedScopes = [];
async function loadScanScopes() {
  try {
    const { scopes } = await (await fetch('/api/scan-scopes')).json();
    authorizedScopes = scopes || [];
  } catch (e) { authorizedScopes = []; }
}
function ipToIntClient(ip) {
  const parts = (ip || '').split('.').map(Number);
  if (parts.length !== 4 || parts.some((p) => !Number.isInteger(p) || p < 0 || p > 255)) return null;
  return ((parts[0] << 24) | (parts[1] << 16) | (parts[2] << 8) | parts[3]) >>> 0;
}
function ipInCidrClient(ip, cidr) {
  const [range, bitsStr] = cidr.split('/');
  const bits = Number(bitsStr);
  const ipInt = ipToIntClient(ip), rangeInt = ipToIntClient(range);
  if (ipInt == null || rangeInt == null) return false;
  const mask = bits === 0 ? 0 : (0xFFFFFFFF << (32 - bits)) >>> 0;
  return (ipInt & mask) === (rangeInt & mask);
}
function isAuthorizedScanTargetClient(ip) {
  return authorizedScopes.some((s) => ipInCidrClient(ip, s.cidr));
}
function connActionsHtml(ip, pid, process) {
  const safe = escapeHtml2(ip || '');
  const killBtn = pid
    ? `<button class="danger" data-action="kill" data-ip="${safe}" data-pid="${pid}" data-proc="${escapeHtml2(process || '')}" title="Proces killen (${escapeHtml2(process || '')} · ${pid})">🚫</button>`
    : '';
  return `<span class="conn-actions">
    <button data-action="whois" data-ip="${safe}" title="WHOIS-opzoeking">🔍</button>
    <button data-action="geoip" data-ip="${safe}" title="Geolocatie">🌍</button>
    <button data-action="scan" data-ip="${safe}" title="SYN-scan (alleen geautoriseerd scan-scope)">🎯</button>
    <button class="danger" data-action="block" data-ip="${safe}" title="IP blokkeren via OPNsense">🛑</button>
    ${killBtn}
  </span>`;
}

async function runLookup(action, ip) {
  if (action === 'whois') {
    openLookupModal('WHOIS — ' + ip);
    setLookupBody('<p class="lk">Bezig...</p>');
    try {
      const r = await (await fetch('/api/whois?ip=' + encodeURIComponent(ip))).json();
      setLookupBody('<pre>' + escapeHtml2(r.text || r.error || '(geen resultaat)') + '</pre>');
    } catch (e) { setLookupBody('<pre>Opzoeking mislukt: ' + escapeHtml2(e.message) + '</pre>'); }
    return;
  }
  if (action === 'geoip') {
    openLookupModal('GeoIP — ' + ip);
    setLookupBody('<p class="lk">Bezig...</p>');
    try {
      const g = await (await fetch('/api/geoip?ip=' + encodeURIComponent(ip))).json();
      if (g.status === 'fail') {
        setLookupBody('<p>' + escapeHtml2(g.message || 'Geen geolocatie beschikbaar.') + '</p>');
        return;
      }
      const rows = [
        ['Land', g.country], ['Regio', g.regionName], ['Stad', g.city],
        ['ISP', g.isp], ['Org', g.org], ['AS', g.as],
      ].filter(([, v]) => v).map(([k, v]) => `<div class="lrow"><span class="lk">${k}</span><span>${escapeHtml2(String(v))}</span></div>`).join('');
      const mapLink = (g.lat != null && g.lon != null)
        ? `<a class="lmap-link" target="_blank" rel="noopener" href="https://www.openstreetmap.org/?mlat=${g.lat}&mlon=${g.lon}#map=8/${g.lat}/${g.lon}">Open op kaart (OpenStreetMap) ↗</a>`
        : '';
      setLookupBody(rows + mapLink);
    } catch (e) { setLookupBody('<p>Opzoeking mislukt: ' + escapeHtml2(e.message) + '</p>'); }
    return;
  }
  if (action === 'scan') {
    if (!isAuthorizedScanTargetClient(ip)) {
      const scopesText = authorizedScopes.length
        ? authorizedScopes.map((s) => `${s.label} (${s.cidr})`).join(', ')
        : '(geen enkele scope geconfigureerd)';
      openLookupModal('SYN-scan geweigerd');
      setLookupBody(
        '<p class="lwarn">⚠ Buiten het geautoriseerde scan-scope</p>' +
        '<p>' + escapeHtml2(ip) + ' valt buiten elk geautoriseerd scan-scope. ' +
        'Deze knop scant alleen expliciet geautoriseerde doelen, nooit willekeurige internet-adressen ' +
        '(Discord, Steam, torrent-peers, etc.) die toevallig in je verkeer voorkomen.</p>' +
        '<p class="lk">Momenteel geautoriseerd: ' + escapeHtml2(scopesText) + '</p>' +
        '<button class="lreturn" id="lookupReturn">← Terug naar overzicht</button>'
      );
      document.getElementById('lookupReturn').addEventListener('click', closeLookupModal);
      return;
    }
    openLookupModal('SYN-scan (nmap, via Kali) — ' + ip);
    setLookupBody('<p class="lk">Bezig met SYN-scan via Kali (top 100 poorten)... dit kan enkele seconden duren.</p>');
    try {
      const r = await (await fetch('/api/nmap-scan?ip=' + encodeURIComponent(ip))).json();
      setLookupBody('<pre>' + escapeHtml2(r.text || r.message || r.error || '(geen resultaat)') + '</pre>');
    } catch (e) { setLookupBody('<pre>Scan mislukt: ' + escapeHtml2(e.message) + '</pre>'); }
    return;
  }
  if (action === 'block') {
    openLookupModal('IP blokkeren — ' + ip);
    setLookupBody(
      '<p>Blokkeer ' + escapeHtml2(ip) + ' via de OPNsense-firewall (dashboard_blocklist-alias). Kies de duur:</p>' +
      '<div class="duration-choice">' +
      '<button data-dur="10m">10 minuten</button>' +
      '<button data-dur="60m">60 minuten</button>' +
      '<button data-dur="permanent">Permanent</button>' +
      '</div>'
    );
    document.querySelectorAll('.duration-choice button').forEach((b) => {
      b.addEventListener('click', async () => {
        setLookupBody('<p class="lk">Bezig met blokkeren...</p>');
        try {
          const res = await fetch('/api/block-ip', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ip, duration: b.dataset.dur }),
          });
          const r = await res.json();
          if (r.error) { setLookupBody('<p class="lwarn">⚠ ' + escapeHtml2(r.message || r.error) + '</p>'); return; }
          setLookupBody('<p>✅ ' + escapeHtml2(ip) + ' geblokkeerd (' + escapeHtml2(b.dataset.dur) + ').</p>');
        } catch (e) { setLookupBody('<p class="lwarn">Blokkeren mislukt: ' + escapeHtml2(e.message) + '</p>'); }
      });
    });
    return;
  }
  if (action === 'kill') {
    return; // handled directly in the click listener (needs pid/proc from the button)
  }
}

function formatRemaining(expiresAt) {
  if (expiresAt == null) return 'permanent';
  const ms = expiresAt - Date.now();
  if (ms <= 0) return 'verloopt zo';
  const min = Math.ceil(ms / 60000);
  return min >= 60 ? `${(min / 60).toFixed(1)}u resterend` : `${min}m resterend`;
}

  setLookupBody(
    '<p class="lwarn">⚠ Weet je het zeker?</p>' +
    '<p>Dit forceert het internet van deze host direct via de KPN-router (enp6s0), ' +
    'los van eventuele OPNsense-routing. Alleen nodig als de OPNsense-migratie een probleem geeft.</p>' +
    '<div class="duration-choice"><button id="fallbackConfirm">Ja, forceer KPN-terugval</button><button id="fallbackCancel">Annuleren</button></div>'
  );
  document.getElementById('fallbackCancel').addEventListener('click', closeLookupModal);
  document.getElementById('fallbackConfirm').addEventListener('click', async () => {
    setLookupBody('<p class="lk">Bezig...</p>');
    try {
      const res = await fetch('/api/network-fallback', { method: 'POST' });
      const r = await res.json();
      setLookupBody((r.ok ? '<p>✅ Terugval uitgevoerd.</p>' : '<p class="lwarn">⚠ Mogelijk mislukt, zie output.</p>') + '<pre>' + escapeHtml2(r.text || '') + '</pre>');
    } catch (e) { setLookupBody('<p class="lwarn">Terugval mislukt: ' + escapeHtml2(e.message) + '</p>'); }
  });
});
async function pollConnections() {
  try {
    const { connections } = await (await fetch('/api/connections')).json();

    // Alert-only rows: traffic between two OTHER lab machines (e.g. Kali
    // scanning Metasploitable2) never touches the host's own socket
    // table, so it has no real row above. Synthesize one, but only for
    // pairs not already covered by an actual host connection either way.
    const now = Date.now();
    const covered = new Set();
    for (const c of connections) covered.add(c.localAddr + '|' + c.peerAddr), covered.add(c.peerAddr + '|' + c.localAddr);
    const syntheticLinks = [];
    for (const [key, link] of recentAlertLinks) {
      if (link.until < now) { recentAlertLinks.delete(key); continue; }
      if (covered.has(link.srcIp + '|' + link.dstIp)) continue;
      syntheticLinks.push(link);
    }
    syntheticLinks.sort((a, b) => b.until - a.until);

    const totalCount = connections.length + syntheticLinks.length;
    const list = document.getElementById('connList');
    const term = connSearchTerm;

    const filteredSynthetic = syntheticLinks.filter((link) => {
      if (!term) return true;
      const meta = CATEGORIES[link.bucket] || CATEGORIES.OTHER;
      const blob = `net ${link.srcIp} ${link.dstIp} ${meta.label}`.toLowerCase();
      return blob.includes(term);
    });

    const filteredReal = connections.filter((c) => {
      if (!term) return true;
      const voip = isVoipOrGame(c.process) ? 'voip voice game' : '';
      const auth = authTagFor(c.localPort, c.peerPort);
      const google = isGoogleIp(c.peerAddr) ? 'youtube google googlevideo' : '';
      const blob = `${c.proto} ${c.localAddr} ${c.localPort} ${c.peerAddr} ${c.peerPort} ${c.process || ''} ${voip} ${auth} ${google}`.toLowerCase();
      return blob.includes(term);
    });

    document.getElementById('connCount').textContent = term
      ? `${filteredSynthetic.length + filteredReal.length} / ${totalCount}`
      : String(totalCount);

    const syntheticHtml = filteredSynthetic.map((link) => {
      const meta = CATEGORIES[link.bucket] || CATEGORIES.OTHER;
      return `<div class="conn-row synthetic threat-${link.level}" title="Suricata-alert (${meta.label}) -- geen live verbinding op deze host, verkeer tussen andere labmachines">
        <span class="proto">NET</span>
        <span class="addr" title="${escapeHtml2(link.srcIp)}">${escapeHtml2(link.srcIp)}</span>
        <span class="arrow">→</span>
        <span class="addr" title="${escapeHtml2(link.dstIp)}">${escapeHtml2(link.dstIp)}</span>
        <span class="proc">${meta.icon} ${escapeHtml2(meta.label)} <span class="pid">(niet deze host)</span></span>
        ${connActionsHtml(link.dstIp)}
      </div>`;
    }).join('');

    const realHtml = filteredReal.map((c) => {
      const isLab = (c.localAddr || '').startsWith('192.168.50.') || (c.peerAddr || '').startsWith('192.168.50.');
      // Only the peer side matters here -- localAddr is always the host's
      // own address, so matching on it would light up every single row
      // whenever the host itself is the scan source.
      const threat = threatLevelFor(c.peerAddr);
      const voip = !threat && isVoipOrGame(c.process);
      const cls = ['conn-row'];
      if (isLab) cls.push('lab');
      if (threat) cls.push('threat-' + threat);
      else if (voip) cls.push('voip');
      const title = threat ? (threat === 'critical' ? 'Aanval/exploit gedetecteerd op dit IP' : 'Scan/verdachte activiteit gedetecteerd op dit IP')
        : voip ? 'VoIP/game-verkeer' : '';
      return `<div class="${cls.join(' ')}" title="${title}">
        <span class="proto">${c.proto}</span>
        <span class="addr" title="${escapeHtml2(c.localAddr)}:${c.localPort}">${escapeHtml2(c.localAddr)}:${c.localPort}</span>
        <span class="arrow">→</span>
        <span class="addr" title="${escapeHtml2(c.peerAddr)}:${c.peerPort}">${escapeHtml2(c.peerAddr)}:${c.peerPort}</span>
        <span class="proc" title="${c.process || ''} (${c.pid || '?'})">${c.process ? escapeHtml2(c.process) : '<span class="pid">?</span>'}<span class="pid">${c.pid ? ' ·' + c.pid : ''}</span></span>
        ${connActionsHtml(c.peerAddr, c.pid, c.process)}
      </div>`;
    }).join('');

    list.innerHTML = (syntheticHtml + realHtml) || (term ? `<div class="conn-empty">Geen verbindingen gevonden voor "${escapeHtml2(term)}"</div>` : '');
  } catch (e) { /* leave last-known list on a transient fetch failure */ }
}

applySettingsToUI();
renderCounters();
loadScanScopes();
poll();
setInterval(poll, 3000);
pollHealth();
setInterval(pollHealth, 1000);
pollOpnWan();
setInterval(pollOpnWan, 10000);
pollVms();
setInterval(pollVms, 10000);
pollConnections();
setInterval(pollConnections, 1000);
</script>
