<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>SOC Homelab — Live Alarmdashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0b0f13;
    --surface: #141a20;
    --surface-2: #1a2128;
    --border: #232b33;
    --text: #e6ebef;
    --muted: #8b97a3;
    --scan: #2b8fd1;
    --exploit: #d13b3b;
    --reverse: #e0316b;
    --ddos: #e0672c;
    --sqli: #8a4fd1;
    --xss: #c99a1f;
    --other: #6b7280;
    --ok: #35a373;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  .mono { font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace; }

  #app { display: flex; flex-direction: column; height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.9rem 1.4rem; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 { font-size: 1.05rem; margin: 0; letter-spacing: 0.01em; }
  header h1 span { color: var(--muted); font-weight: 400; font-size: 0.85rem; margin-left: 0.6rem; }
  .status { display: flex; align-items: center; gap: 1.4rem; font-size: 0.82rem; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 0.4rem; background: var(--muted); }
  .dot.live { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
  .dot.stale { background: var(--exploit); }
  #mute { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 0.35rem 0.8rem; cursor: pointer; font-size: 0.8rem; }
  #mute.muted { color: var(--exploit); border-color: var(--exploit); }

  .counters {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px;
    background: var(--border); border-bottom: 1px solid var(--border);
  }
  .counter { background: var(--surface); padding: 0.7rem 0.9rem; text-align: center; }
  .counter .n { font-family: ui-monospace, monospace; font-variant-numeric: tabular-nums; font-size: 1.5rem; font-weight: 700; }
  .counter .l { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin-top: 0.15rem; }

  main { flex: 1; overflow-y: auto; padding: 1rem 1.4rem 2rem; }
  .feed { display: flex; flex-direction: column; gap: 0.5rem; max-width: 1100px; margin: 0 auto; }
  .row {
    display: grid; grid-template-columns: 6px 100px 90px 1fr auto; gap: 0.9rem;
    align-items: center; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.55rem 0.9rem; font-size: 0.85rem;
    animation: fadein 0.3s ease-out;
  }
  @keyframes fadein { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .row .bar { width: 6px; align-self: stretch; border-radius: 4px; }
  .row .time { color: var(--muted); font-size: 0.76rem; }
  .row .bucket { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
  .row .sig { }
  .row .net { color: var(--muted); font-size: 0.76rem; text-align: right; white-space: nowrap; }
  .empty { color: var(--muted); text-align: center; padding: 3rem 1rem; }

  #banner-stack {
    position: fixed; top: 4.6rem; left: 50%; transform: translateX(-50%);
    z-index: 50; display: flex; flex-direction: column; gap: 0.6rem; pointer-events: none;
    width: min(640px, 92vw);
  }
  .banner {
    border-radius: 12px; padding: 1rem 1.3rem; color: #fff;
    box-shadow: 0 10px 30px rgba(0,0,0,0.45);
    display: flex; align-items: center; gap: 0.9rem;
    animation: slidein 0.35s cubic-bezier(.2,.8,.2,1), fadeout 0.5s ease-in forwards 9.5s;
  }
  @keyframes slidein { from { opacity: 0; transform: translateY(-16px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes fadeout { to { opacity: 0; transform: translateY(-8px); } }
  .banner .icon { font-size: 1.8rem; line-height: 1; }
  .banner .body { flex: 1; min-width: 0; }
  .banner .btitle { font-weight: 700; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.03em; }
  .banner .bsig { font-size: 0.88rem; opacity: 0.95; margin-top: 0.15rem; }
  .banner .bnet { font-family: ui-monospace, monospace; font-size: 0.78rem; opacity: 0.85; margin-top: 0.3rem; }

  @media (prefers-reduced-motion: reduce) {
    .row, .banner { animation: none !important; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>SOC Homelab — Live Alarmdashboard <span>Bazzite-host</span></h1>
    <div class="status">
      <span><span id="statusDot" class="dot"></span><span id="statusText">verbinden...</span></span>
      <span id="totalCount" class="mono">0 alerts</span>
      <button id="mute">🔊 Geluid aan</button>
    </div>
  </header>

  <div class="counters" id="counters"></div>

  <main><div class="feed" id="feed"><div class="empty">Wachten op de eerste poll...</div></div></main>
</div>
<div id="banner-stack"></div>

<script>
const CATEGORIES = {
  REVERSE_SHELL: { label: 'Reverse Shell', color: 'var(--reverse)', icon: '💀', freq: 220 },
  SQLI:          { label: 'SQL Injection', color: 'var(--sqli)',    icon: '🗄️', freq: 330 },
  XSS:           { label: 'Cross-Site Scripting', color: 'var(--xss)', icon: '📜', freq: 392 },
  DDOS:          { label: 'DDoS / DoS', color: 'var(--ddos)', icon: '🌊', freq: 262 },
  EXPLOIT:       { label: 'Exploit', color: 'var(--exploit)', icon: '💥', freq: 196 },
  SCAN:          { label: 'Scan / Recon', color: 'var(--scan)', icon: '🔍', freq: 494 },
  OTHER:         { label: 'Overig', color: 'var(--other)', icon: 'ℹ️', freq: 440 },
};
const ORDER = ['SCAN','EXPLOIT','REVERSE_SHELL','DDOS','SQLI','XSS','OTHER'];

let muted = false;
let lastSince = 0;
let counts = Object.fromEntries(ORDER.map(k => [k, 0]));
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// Fallback synthetic beep -- used only if a spoken-alert audio clip isn't
// available (e.g. Piper/TTS failed server-side for this alert).
function playBeepFallback(bucket, severity) {
  if (muted) return;
  try {
    const ctx = ensureAudio();
    const meta = CATEGORIES[bucket] || CATEGORIES.OTHER;
    const beeps = severity === 'high' ? 3 : severity === 'medium' ? 2 : 1;
    for (let i = 0; i < beeps; i++) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.frequency.value = meta.freq;
      gain.gain.value = 0.08;
      osc.connect(gain).connect(ctx.destination);
      const start = ctx.currentTime + i * 0.22;
      gain.gain.setValueAtTime(0.08, start);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.16);
      osc.start(start);
      osc.stop(start + 0.18);
    }
  } catch (e) { /* audio not available yet (needs a user gesture first in some browsers) */ }
}

// Spoken alert: siren + female-voice (Piper, offline neural TTS)
// announcement generated server-side per alert. Falls back to the
// synthetic beep if no audio clip was produced. Queued (not overlapped) --
// each clip is ~4-9s, and two different signatures can legitimately fire
// in the same poll cycle (dedup is per-signature, not global), which
// would otherwise mean two voices talking over each other.
let voiceQueue = Promise.resolve();
function playSpokenAlert(a) {
  if (muted) return;
  if (!a.audioUrl) { playBeepFallback(a.bucket, a.severity); return; }
  voiceQueue = voiceQueue.then(() => new Promise((resolve) => {
    if (muted) { resolve(); return; } // re-check: could've been muted while queued
    const audio = new Audio(a.audioUrl);
    audio.onended = resolve;
    audio.onerror = () => { playBeepFallback(a.bucket, a.severity); resolve(); };
    audio.play().catch(() => { playBeepFallback(a.bucket, a.severity); resolve(); });
  }));
}

function renderCounters() {
  const el = document.getElementById('counters');
  el.innerHTML = ORDER.map(k => {
    const m = CATEGORIES[k];
    return `<div class="counter" style="border-bottom:3px solid ${m.color}">
      <div class="n" style="color:${m.color}">${counts[k]}</div>
      <div class="l">${m.icon} ${m.label}</div>
    </div>`;
  }).join('');
}

function addRow(a) {
  const feed = document.getElementById('feed');
  if (feed.querySelector('.empty')) feed.innerHTML = '';
  const meta = CATEGORIES[a.bucket] || CATEGORIES.OTHER;
  const row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = `
    <div class="bar" style="background:${meta.color}"></div>
    <div class="time mono">${a.timestamp.slice(11,19)}</div>
    <div class="bucket" style="color:${meta.color}">${meta.icon} ${meta.label}</div>
    <div class="sig">${escapeHtml(a.signature)}</div>
    <div class="net mono">${a.srcIp}:${a.srcPort} → ${a.dstIp}:${a.dstPort}</div>
  `;
  feed.prepend(row);
  while (feed.children.length > 300) feed.removeChild(feed.lastChild);
}

function showBanner(a) {
  const meta = CATEGORIES[a.bucket] || CATEGORIES.OTHER;
  const stack = document.getElementById('banner-stack');
  const b = document.createElement('div');
  b.className = 'banner';
  b.style.background = meta.color;
  b.innerHTML = `
    <div class="icon">${meta.icon}</div>
    <div class="body">
      <div class="btitle">${meta.label} gedetecteerd</div>
      <div class="bsig">${escapeHtml(a.signature)}</div>
      <div class="bnet">${a.srcIp}:${a.srcPort} → ${a.dstIp}:${a.dstPort} · severity: ${a.severity}</div>
    </div>
  `;
  stack.appendChild(b);
  setTimeout(() => b.remove(), 10200);
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function poll() {
  try {
    const res = await fetch('/api/alerts?since=' + lastSince);
    const data = await res.json();
    document.getElementById('statusDot').className = 'dot live';
    document.getElementById('statusText').textContent = data.lastPollOk ? ('live · laatste poll ' + data.lastPollOk.slice(11,19) + ' UTC') : 'verbonden';
    document.getElementById('totalCount').textContent = data.total + ' alerts (deze sessie)';

    const newOnes = data.alerts.slice().reverse(); // oldest of the new batch first
    for (const a of newOnes) {
      counts[a.bucket] = (counts[a.bucket] || 0) + 1;
      addRow(a);
      if (a.notify) { showBanner(a); playSpokenAlert(a); }
      lastSince = Math.max(lastSince, a.receivedAt);
    }
    if (newOnes.length) renderCounters();
  } catch (e) {
    document.getElementById('statusDot').className = 'dot stale';
    document.getElementById('statusText').textContent = 'verbinding verbroken, opnieuw proberen...';
  }
}

document.getElementById('mute').addEventListener('click', () => {
  muted = !muted;
  const btn = document.getElementById('mute');
  btn.textContent = muted ? '🔇 Geluid uit' : '🔊 Geluid aan';
  btn.classList.toggle('muted', muted);
  if (!muted) ensureAudio();
});

renderCounters();
poll();
setInterval(poll, 3000);
</script>
</body>
</html>
